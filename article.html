<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artikel — Revpeak</title>
  <link rel="icon" href="/logo-revpeak.webp" type="image/webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a href="/" class="site-logo" aria-label="Revpeak - Beranda">
        <img src="/logo-revpeak.webp" alt="Revpeak" width="120" height="36">
      </a>
      <nav class="site-nav" aria-label="Navigasi utama">
        <a href="/">Beranda</a>
        <a href="/berita.html">Berita</a>
        <a href="/artikel.html">Artikel</a>
        <a href="/kategori.html">Kategori</a>
      </nav>
      <form id="header-search-form" class="header-search" role="search" aria-label="Cari artikel">
        <input id="header-search-input" type="search" placeholder="Cari..." aria-label="Kata kunci pencarian">
        <button type="submit" aria-label="Cari">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </form>
      <button class="nav-toggle" aria-label="Buka menu" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main id="main-content">
    <div class="container article-layout">

      <!-- KONTEN ARTIKEL -->
      <div id="article-wrapper" class="article-main">

        <!-- Skeleton awal (diganti JS) -->
        <div class="article-skeleton" aria-label="Memuat artikel..." role="status">
          <div class="skeleton-box article-thumb-skeleton"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-line title-line"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>

        <!-- Breadcrumb (diisi JS) -->
        <div id="breadcrumb" class="article-breadcrumb"></div>

        <!-- Header artikel -->
        <header class="article-header" hidden>
          <div class="article-meta-top">
            <a id="article-category" href="#" class="article-category-link"></a>
            <span id="article-type-badge" class="article-badge"></span>
          </div>
          <h1 id="article-title" class="article-title"></h1>
          <p id="article-excerpt" class="article-excerpt"></p>
          <div class="article-meta-bar">
            <div class="article-author-info">
              <div class="author-avatar-wrap">
                <img id="article-author-avatar" class="article-author-avatar" src="" alt="" loading="lazy">
              </div>
              <div class="article-author-text">
                <a id="article-author-link" href="#" class="article-author-name-link">
                  <span id="article-author-name" class="article-author-name"></span>
                </a>
                <div class="article-meta-secondary">
                  <time id="article-date" class="article-date"></time>
                  <span class="meta-sep" aria-hidden="true">·</span>
                  <span id="article-views" class="article-views"></span>
                </div>
              </div>
            </div>
          </div>
        </header>

        <!-- Thumbnail -->
        <div class="article-thumbnail-wrap" hidden>
          <img id="article-thumbnail" class="article-thumbnail" src="" alt="" loading="lazy">
        </div>

        <!-- Body konten -->
        <div id="article-content" class="article-content" hidden></div>

        <!-- Tags -->
        <div id="article-tags" class="article-tags" hidden></div>

      </div><!-- /article-main -->

      <!-- SIDEBAR -->
      <aside class="article-sidebar" aria-label="Sidebar">
        <div id="sidebar-trending" class="sidebar-widget"></div>

        <div class="sidebar-widget sidebar-share">
          <h3 class="sidebar-title">Bagikan</h3>
          <div class="share-buttons">
            <button class="share-btn share-twitter" aria-label="Bagikan ke Twitter" onclick="shareArticle('twitter')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              Twitter
            </button>
            <button class="share-btn share-wa" aria-label="Bagikan ke WhatsApp" onclick="shareArticle('whatsapp')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              WhatsApp
            </button>
            <button class="share-btn share-copy" aria-label="Salin tautan" onclick="copyLink()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              Salin Tautan
            </button>
          </div>
        </div>
      </aside>

    </div><!-- /container -->

    <!-- ARTIKEL TERKAIT -->
    <section class="related-section" aria-label="Artikel terkait">
      <div class="container">
        <h2 class="section-title">Artikel Terkait</h2>
        <div id="related-articles">
          <div class="related-grid"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="footer-brand">
        <a href="/" aria-label="Revpeak">
          <img src="/logo-revpeak.webp" alt="Revpeak" width="100" height="30" loading="lazy">
        </a>
        <p class="footer-desc">Berita dan artikel terpercaya seputar teknologi, bisnis, dan gaya hidup.</p>
      </div>
      <nav class="footer-nav" aria-label="Navigasi footer">
        <a href="/tentang.html">Tentang</a>
        <a href="/kontak.html">Kontak</a>
        <a href="/kebijakan.html">Kebijakan Privasi</a>
        <a href="/disclaimer.html">Disclaimer</a>
      </nav>
      <p class="footer-copy">&copy; <span id="footer-year"></span> Revpeak. Semua hak dilindungi.</p>
    </div>
  </footer>

  <script>
    // Share helpers
    function shareArticle(platform) {
      const url   = encodeURIComponent(window.location.href);
      const title = encodeURIComponent(document.title);
      const links = {
        twitter:  `https://twitter.com/intent/tweet?url=${url}&text=${title}`,
        whatsapp: `https://wa.me/?text=${title}%20${url}`,
      };
      if (links[platform]) window.open(links[platform], "_blank", "noopener,noreferrer");
    }
    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.querySelector(".share-copy");
        if (btn) { btn.textContent = "✓ Tersalin!"; setTimeout(() => btn.textContent = "Salin Tautan", 2000); }
      });
    }
    // Footer year
    document.getElementById("footer-year").textContent = new Date().getFullYear();
  </script>
  <script src="js/seo.js" defer></script>
  <script src="js/article.js" defer></script>
</body>
</html>
