<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hubungi RevPeak untuk pertanyaan, saran, atau masukan.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://revpeak.web.id/kontak.html">
  <link rel="icon" type="image/webp" href="https://assets.revpeak.web.id/logo-revpeak.webp">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages.css">

  <title>Kontak – RevPeak</title>
</head>
<body>

<div class="page-hero">
  <div class="container">
    <h1 class="page-hero-title">Hubungi Saya</h1>
    <p class="page-hero-desc">Jika Anda memiliki pertanyaan atau saran, silakan kirim pesan.</p>
  </div>
</div>

<main>
  <div class="container">
    <div class="kontak-layout">

      <!-- FORM -->
      <div class="kontak-form-card">

        <h2 class="kontak-form-title">Kirim Pesan</h2>
        <p class="kontak-form-desc">Saya akan berusaha membalas secepat mungkin.</p>

        <div class="form-group-k">
          <label class="form-label-k">Nama</label>
          <input type="text" id="nama" class="form-input-k" placeholder="Nama Anda">
        </div>

        <div class="form-group-k">
          <label class="form-label-k">Email</label>
          <input type="email" id="email" class="form-input-k" placeholder="email@contoh.com">
        </div>

        <div class="form-group-k">
          <label class="form-label-k">Pesan</label>
          <textarea id="pesan" class="form-input-k" rows="5" placeholder="Tulis pesan Anda..."></textarea>
        </div>

        <button class="btn-kirim" onclick="kirimPesan()">Kirim Pesan</button>

        <!-- SUCCESS -->
        <div class="form-success" id="form-success">
          <div class="form-success-icon">✅</div>
          <div class="form-success-title">Pesan Terkirim!</div>
          <div class="form-success-desc">
            Terima kasih, saya akan segera membalas pesan Anda.
          </div>
        </div>

      </div>

      <!-- INFO -->
      <div class="kontak-info-cards">

        <div class="kontak-info-card">
          <div class="kontak-info-icon">👤</div>
          <div>
            <div class="kontak-info-title">Pemilik</div>
            <div class="kontak-info-val">Asran</div>
          </div>
        </div>

        <div class="kontak-info-card">
          <div class="kontak-info-icon">🌐</div>
          <div>
            <div class="kontak-info-title">Website</div>
            <div class="kontak-info-val">revpeak.web.id</div>
          </div>
        </div>

        <div class="kontak-info-card">
          <div class="kontak-info-icon">⏰</div>
          <div>
            <div class="kontak-info-title">Respons</div>
            <div class="kontak-info-val">1–2 hari</div>
          </div>
        </div>

      </div>

    </div>
  </div>
</main>

<script>
function kirimPesan() {
  const nama = document.getElementById('nama').value.trim();
  const email = document.getElementById('email').value.trim();
  const pesan = document.getElementById('pesan').value.trim();

  if (!nama || !email || !pesan) {
    alert("Mohon isi semua field terlebih dahulu.");
    return;
  }

  const btn = document.querySelector('.btn-kirim');
  btn.innerText = "Mengirim...";
  btn.disabled = true;

  setTimeout(() => {
    document.querySelectorAll('.form-group-k').forEach(el => el.style.display = 'none');
    btn.style.display = 'none';
    document.getElementById('form-success').style.display = 'block';
  }, 1200);
}
</script>

</body>
</html>
