# ============================================================
# REVPEAK — Agen Konten AI
# GitHub Actions + Cloudflare Workers AI REST API
# Berjalan 6x sehari (setiap 4 jam)
# Artikel: 7 section × ~400 kata = ~2800 kata
# News   : 4 section × ~350 kata = ~1400 kata
# ============================================================

name: Agen Konten AI

on:
  schedule:
    # Jam UTC: 00, 04, 08, 12, 16, 20
    # Jam WIB: 07, 11, 15, 19, 23, 03
    - cron: "0 0 * * *"
    - cron: "0 4 * * *"
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
    - cron: "0 20 * * *"

  # Jalankan manual dari tab Actions
  workflow_dispatch:

jobs:
  generate:
    name: Generate & Publish Artikel
    runs-on: ubuntu-latest
    # Dinaikkan dari 10 ke 25 menit karena multi-section API calls
    # article: 1 (meta) + 1 (outline) + 7 (section) = 9 calls
    # news   : 1 (meta) + 1 (outline) + 4 (section) = 6 calls
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Jalankan Agen Konten
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CF_ACCOUNT_ID:        ${{ secrets.CF_ACCOUNT_ID }}
          CF_AI_TOKEN:          ${{ secrets.CF_AI_TOKEN }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node agen-konten.js
