<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cari — Revpeak</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="/logo-revpeak.webp" type="image/webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a href="/" class="site-logo" aria-label="Revpeak - Beranda">
        <img src="/logo-revpeak.webp" alt="Revpeak" width="120" height="36">
      </a>
      <nav class="site-nav" aria-label="Navigasi utama">
        <a href="/">Beranda</a>
        <a href="/berita.html">Berita</a>
        <a href="/artikel.html">Artikel</a>
        <a href="/kategori.html">Kategori</a>
      </nav>
      <form id="header-search-form" class="header-search" role="search" aria-label="Cari artikel">
        <input id="header-search-input" type="search" placeholder="Cari..." aria-label="Kata kunci pencarian">
        <button type="submit" aria-label="Cari">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </form>
      <button class="nav-toggle" aria-label="Buka menu" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main id="main-content">

    <!-- SEARCH HERO -->
    <section class="page-hero search-hero" aria-label="Pencarian">
      <div class="container">
        <h1 class="page-title">Cari Artikel</h1>

        <!-- Form pencarian besar -->
        <form id="search-form" class="search-form-main" role="search" aria-label="Form pencarian utama">
          <div class="search-input-wrap">
            <svg class="search-icon-main" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input
              id="search-input"
              type="search"
              class="search-input-main"
              placeholder="Ketik kata kunci..."
              autocomplete="off"
              aria-label="Kata kunci pencarian"
            >
            <button type="submit" class="search-submit-btn">Cari</button>
          </div>
        </form>

        <!-- Filter tipe -->
        <div class="search-filters" role="group" aria-label="Filter jenis konten">
          <button class="filter-chip active" data-filter="all" aria-pressed="true">Semua</button>
          <button class="filter-chip" data-filter="article" aria-pressed="false">Artikel</button>
          <button class="filter-chip" data-filter="news" aria-pressed="false">Berita</button>
        </div>
      </div>
    </section>

    <!-- HASIL PENCARIAN -->
    <div class="container listing-layout">
      <section class="listing-main" aria-label="Hasil pencarian">

        <!-- Label hasil -->
        <div class="search-query-label" aria-live="polite" aria-atomic="true"></div>

        <div id="articles-grid" class="articles-grid" aria-live="polite" aria-label="Hasil pencarian">
          <!-- Diisi oleh app.js -->
          <div class="search-empty-default">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <p>Masukkan kata kunci untuk mulai mencari.</p>
          </div>
        </div>

      </section>

      <!-- SIDEBAR -->
      <aside class="listing-sidebar" aria-label="Sidebar">
        <div id="sidebar-trending" class="sidebar-widget"></div>

        <div class="sidebar-widget">
          <h3 class="sidebar-title">Telusuri</h3>
          <div class="quick-links">
            <a href="/berita.html" class="quick-link">
              <span>📰</span> Berita Terkini
            </a>
            <a href="/artikel.html" class="quick-link">
              <span>📝</span> Semua Artikel
            </a>
            <a href="/kategori.html" class="quick-link">
              <span>🗂️</span> Kategori
            </a>
          </div>
        </div>
      </aside>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="footer-brand">
        <a href="/" aria-label="Revpeak">
          <img src="/logo-revpeak.webp" alt="Revpeak" width="100" height="30" loading="lazy">
        </a>
        <p class="footer-desc">Berita dan artikel terpercaya seputar teknologi, bisnis, dan gaya hidup.</p>
      </div>
      <nav class="footer-nav" aria-label="Navigasi footer">
        <a href="/tentang.html">Tentang</a>
        <a href="/kontak.html">Kontak</a>
        <a href="/kebijakan.html">Kebijakan Privasi</a>
        <a href="/disclaimer.html">Disclaimer</a>
      </nav>
      <p class="footer-copy">&copy; <span id="footer-year"></span> Revpeak. Semua hak dilindungi.</p>
    </div>
  </footer>

  <script>
    document.getElementById("footer-year").textContent = new Date().getFullYear();

    // Filter chip — kirim ulang pencarian dengan type filter
    document.querySelectorAll(".filter-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        document.querySelectorAll(".filter-chip").forEach(c => {
          c.classList.remove("active");
          c.setAttribute("aria-pressed", "false");
        });
        chip.classList.add("active");
        chip.setAttribute("aria-pressed", "true");

        const q    = new URLSearchParams(window.location.search).get("q") || "";
        const type = chip.dataset.filter;
        if (!q) return;

        const newUrl = type === "all"
          ? `/search.html?q=${encodeURIComponent(q)}`
          : `/search.html?q=${encodeURIComponent(q)}&type=${type}`;

        window.location.href = newUrl;
      });
    });

    // Set active chip dari URL
    const params = new URLSearchParams(window.location.search);
    const typeParam = params.get("type");
    if (typeParam) {
      document.querySelectorAll(".filter-chip").forEach(c => {
        const isActive = c.dataset.filter === typeParam;
        c.classList.toggle("active", isActive);
        c.setAttribute("aria-pressed", isActive ? "true" : "false");
      });
    }
  </script>
  <script src="js/seo.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
