<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artikel — Revpeak</title>
  <meta name="description" content="Kumpulan artikel informatif dan mendalam dari tim Revpeak.">
  <link rel="icon" href="/logo-revpeak.webp" type="image/webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a href="/" class="site-logo" aria-label="Revpeak - Beranda">
        <img src="/logo-revpeak.webp" alt="Revpeak" width="120" height="36">
      </a>
      <nav class="site-nav" aria-label="Navigasi utama">
        <a href="/">Beranda</a>
        <a href="/berita.html">Berita</a>
        <a href="/artikel.html" aria-current="page">Artikel</a>
        <a href="/kategori.html">Kategori</a>
      </nav>
      <form id="header-search-form" class="header-search" role="search" aria-label="Cari artikel">
        <input id="header-search-input" type="search" placeholder="Cari..." aria-label="Kata kunci pencarian">
        <button type="submit" aria-label="Cari">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </form>
      <button class="nav-toggle" aria-label="Buka menu" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main id="main-content">

    <!-- PAGE HERO -->
    <section class="page-hero" aria-label="Header halaman">
      <div class="container">
        <div class="page-hero-inner">
          <div class="page-hero-label">Konten</div>
          <h1 class="page-title">Artikel</h1>
          <p class="page-subtitle">Bacaan mendalam, analisis, dan panduan dari tim editorial Revpeak.</p>
        </div>
      </div>
    </section>

    <!-- KONTEN -->
    <div class="container listing-layout">

      <!-- GRID ARTIKEL -->
      <section class="listing-main" aria-label="Daftar artikel">
        <!-- Filter bar -->
        <div class="listing-bar" role="toolbar" aria-label="Filter konten">
          <div class="listing-count" id="listing-info" aria-live="polite"></div>
          <div class="listing-sort">
            <label for="sort-select" class="sr-only">Urutkan</label>
            <select id="sort-select" class="sort-select">
              <option value="latest">Terbaru</option>
              <option value="popular">Terpopuler</option>
            </select>
          </div>
        </div>

        <div id="articles-grid" class="articles-grid" aria-label="Daftar artikel" aria-live="polite">
          <!-- Diisi oleh app.js -->
        </div>

        <div id="pagination" class="pagination-wrap" aria-label="Navigasi halaman"></div>
      </section>

      <!-- SIDEBAR -->
      <aside class="listing-sidebar" aria-label="Sidebar">
        <div id="sidebar-trending" class="sidebar-widget"></div>

        <div class="sidebar-widget">
          <h3 class="sidebar-title">Kategori</h3>
          <nav id="sidebar-categories" class="sidebar-categories" aria-label="Navigasi kategori">
            <!-- Diisi oleh app.js opsional -->
          </nav>
        </div>
      </aside>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="footer-brand">
        <a href="/" aria-label="Revpeak">
          <img src="/logo-revpeak.webp" alt="Revpeak" width="100" height="30" loading="lazy">
        </a>
        <p class="footer-desc">Berita dan artikel terpercaya seputar teknologi, bisnis, dan gaya hidup.</p>
      </div>
      <nav class="footer-nav" aria-label="Navigasi footer">
        <a href="/tentang.html">Tentang</a>
        <a href="/kontak.html">Kontak</a>
        <a href="/kebijakan.html">Kebijakan Privasi</a>
        <a href="/disclaimer.html">Disclaimer</a>
      </nav>
      <p class="footer-copy">&copy; <span id="footer-year"></span> Revpeak. Semua hak dilindungi.</p>
    </div>
  </footer>

  <script>
    document.getElementById("footer-year").textContent = new Date().getFullYear();
  </script>
  <script src="js/seo.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
