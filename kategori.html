<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Semua kategori review di Revpeak – Smartphone, Laptop, E-Book, Novel, Gaming, dan lebih banyak lagi.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>Semua Kategori – Revpeak</title>
  <style>
    .page-hero {
      background: linear-gradient(135deg, var(--primary) 0%, #1E40AF 100%);
      padding: 48px 0; color: white; text-align: center;
    }
    .page-hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
    .page-hero p { color: rgba(255,255,255,0.8); font-size: 16px; }
    .categories-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
      padding: 48px 0;
    }
    .cat-card {
      background: var(--bg-card); border-radius: var(--radius-lg);
      border: 1px solid var(--border); padding: 28px 20px;
      text-align: center; cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      text-decoration: none; color: inherit; display: block;
    }
    .cat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
    .cat-icon-big { font-size: 48px; margin-bottom: 12px; display: block; }
    .cat-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .cat-count { font-size: 13px; color: var(--text-muted); }
    @media (max-width: 768px) { .categories-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .categories-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
  </style>
</head>
<body>

  <header class="header">
    <div class="container">
      <div class="header-inner">
        <a href="/" class="logo">⚡ Rev<span>peak</span></a>
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="search" placeholder="Cari review..." aria-label="Cari"
            onkeydown="if(event.key==='Enter')window.location.href='/?q='+encodeURIComponent(this.value)">
        </div>
        <nav id="main-nav" class="nav">
          <a href="/">Beranda</a>
          <a href="kategori.html" class="active">Kategori</a>
          <a href="tentang.html">Tentang</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" aria-label="Ganti tema">🌙</button>
        <button id="hamburger" class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <div class="page-hero">
    <div class="container">
      <h1>📂 Semua Kategori</h1>
      <p>Temukan review berdasarkan kategori yang kamu minati</p>
    </div>
  </div>

  <main class="container">
    <div id="categories-grid" class="categories-grid">
      <!-- Loaded via JS -->
      <div class="cat-card"><span class="cat-icon-big">⏳</span><div class="cat-name">Memuat...</div></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2025 Revpeak. Semua hak dilindungi.</p>
        <div class="social-links">
          <a href="#" aria-label="Instagram">📸</a>
          <a href="#" aria-label="YouTube">▶️</a>
          <a href="#" aria-label="Telegram">✈️</a>
        </div>
      </div>
    </div>
  </footer>

  <button id="scroll-top" class="scroll-top" aria-label="Kembali ke atas">↑</button>
  <script src="js/app.js"></script>
  <script>
    async function loadCategories() {
      const grid = document.getElementById('categories-grid');
      const data = await fetchAPI('/categories');
      const cats = data?.data || data || [];

      // Fallback jika Worker belum siap
      const fallback = [
        { name: 'Smartphone', slug: 'smartphone', icon: '📱', count: 0 },
        { name: 'Laptop', slug: 'laptop', icon: '💻', count: 0 },
        { name: 'E-Book', slug: 'ebook', icon: '📚', count: 0 },
        { name: 'Novel', slug: 'novel', icon: '📖', count: 0 },
        { name: 'Aksesoris', slug: 'aksesoris', icon: '🎧', count: 0 },
        { name: 'Software', slug: 'software', icon: '💿', count: 0 },
        { name: 'Gaming', slug: 'gaming', icon: '🎮', count: 0 },
        { name: 'Kamera', slug: 'kamera', icon: '📷', count: 0 },
      ];

      const list = cats.length ? cats : fallback;
      grid.innerHTML = list.map(c => `
        <a href="/?cat=${c.id || c.slug}" class="cat-card">
          <span class="cat-icon-big">${c.icon || '📌'}</span>
          <div class="cat-name">${c.name}</div>
          <div class="cat-count">${c.review_count || c.count || 0} review</div>
        </a>
      `).join('');
    }
    document.addEventListener('DOMContentLoaded', loadCategories);
  </script>
</body>
</html>
