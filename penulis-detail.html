<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penulis — Revpeak</title>
  <link rel="icon" href="/logo-revpeak.webp" type="image/webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a href="/" class="site-logo" aria-label="Revpeak - Beranda">
        <img src="/logo-revpeak.webp" alt="Revpeak" width="120" height="36">
      </a>
      <nav class="site-nav" aria-label="Navigasi utama">
        <a href="/">Beranda</a>
        <a href="/berita.html">Berita</a>
        <a href="/artikel.html">Artikel</a>
        <a href="/kategori.html">Kategori</a>
      </nav>
      <form id="header-search-form" class="header-search" role="search" aria-label="Cari artikel">
        <input id="header-search-input" type="search" placeholder="Cari..." aria-label="Kata kunci pencarian">
        <button type="submit" aria-label="Cari">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </form>
      <button class="nav-toggle" aria-label="Buka menu" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main id="main-content">

    <!-- PROFIL PENULIS -->
    <section class="author-hero" aria-label="Profil penulis">
      <div class="container">
        <nav class="breadcrumb-simple" aria-label="Breadcrumb">
          <a href="/">Beranda</a>
          <span aria-hidden="true">/</span>
          <a href="/penulis.html">Penulis</a>
          <span aria-hidden="true">/</span>
          <span class="author-name" aria-current="page">Memuat...</span>
        </nav>

        <div class="author-profile">
          <div class="author-avatar-wrap-lg">
            <img class="author-avatar" id="author-avatar-img"
                 src="/assets/img/avatar-placeholder.png"
                 alt="Avatar penulis" loading="lazy"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <div class="author-avatar-fallback" style="display:none" aria-hidden="true">
              <span id="author-avatar-initial"></span>
            </div>
          </div>
          <div class="author-profile-info">
            <h1 class="author-name" id="author-name-heading">
              <span class="author-name">Memuat penulis...</span>
            </h1>
            <p class="author-bio" id="author-bio"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- ARTIKEL PENULIS -->
    <div class="container listing-layout">
      <section class="listing-main" aria-label="Artikel oleh penulis ini">
        <h2 class="listing-section-title">Artikel oleh Penulis Ini</h2>

        <div id="articles-grid" class="articles-grid" aria-live="polite">
          <!-- Diisi oleh app.js -->
        </div>

        <div id="pagination" class="pagination-wrap" aria-label="Navigasi halaman"></div>
      </section>

      <aside class="listing-sidebar" aria-label="Sidebar">
        <div id="sidebar-trending" class="sidebar-widget"></div>
      </aside>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="footer-brand">
        <a href="/" aria-label="Revpeak">
          <img src="/logo-revpeak.webp" alt="Revpeak" width="100" height="30" loading="lazy">
        </a>
        <p class="footer-desc">Berita dan artikel terpercaya seputar teknologi, bisnis, dan gaya hidup.</p>
      </div>
      <nav class="footer-nav" aria-label="Navigasi footer">
        <a href="/tentang.html">Tentang</a>
        <a href="/kontak.html">Kontak</a>
        <a href="/kebijakan.html">Kebijakan Privasi</a>
        <a href="/disclaimer.html">Disclaimer</a>
      </nav>
      <p class="footer-copy">&copy; <span id="footer-year"></span> Revpeak. Semua hak dilindungi.</p>
    </div>
  </footer>

  <script>
    document.getElementById("footer-year").textContent = new Date().getFullYear();

    // Sinkronkan .author-name dengan data dari JS
    // app.js akan mengisi #author-name-heading → .author-name
    // dan .author-bio, .author-avatar
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");
    if (slug) {
      const displayName = slug.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      document.title = `${displayName} — Revpeak`;
      // Avatar initial fallback
      const initEl = document.getElementById("author-avatar-initial");
      if (initEl) initEl.textContent = displayName.charAt(0).toUpperCase();
    }
  </script>
  <script src="js/seo.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
