# ============================================================
# REVPEAK — GitHub Actions Workflow
# Nama file: .github/workflows/agen-perpustakaan.yml
# Jadwal   : Setiap hari pukul 07:00 UTC (14:00 WIB)
# ============================================================

name: Agen Perpustakaan

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 14:00 WIB, setiap hari
  workflow_dispatch:        # Bisa dijalankan manual dari GitHub

jobs:
  jalankan-agen:
    name: Generate & Publikasi Buku Harian
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependensi (pdfkit)
        run: npm install pdfkit --no-save

      - name: Jalankan agen perpustakaan
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          CF_ACCOUNT_ID:         ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:          ${{ secrets.CF_API_TOKEN }}
          CF_R2_LIB_BUCKET:      ${{ secrets.CF_R2_LIB_BUCKET }}
          R2_LIB_URL:            ${{ secrets.R2_LIB_URL }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/agen-perpustakaan.js
