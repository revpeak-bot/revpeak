# ============================================================
# REVPEAK — Agen Konten AI
# GitHub Actions + Cloudflare Workers AI REST API
# Berjalan 6x sehari (setiap 4 jam)
#
# Alur per run:
#   1. Generate metadata (title, excerpt, tags, meta_desc, image_prompt)
#   2. Generate outline → konten per section (paralel dengan gambar)
#   3. Generate gambar AI via CF Workers AI (Stable Diffusion XL)
#   4. Upload gambar ke Cloudflare R2
#   5. Simpan semua kolom ke Supabase
#
# Estimasi waktu:
#   article: 1(meta) + 1(outline) + 7(section) + 1(gambar+upload) = ~10 calls
#   news   : 1(meta) + 1(outline) + 4(section) + 1(gambar+upload) = ~7 calls
# ============================================================

name: Agen Konten AI

on:
  schedule:
    # Jam UTC: 00, 04, 08, 12, 16, 20
    # Jam WIB: 07, 11, 15, 19, 23, 03
    - cron: "0 0 * * *"
    - cron: "0 4 * * *"
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
    - cron: "0 20 * * *"

  # Jalankan manual dari tab Actions
  workflow_dispatch:

jobs:
  generate:
    name: Generate & Publish Artikel
    runs-on: ubuntu-latest
    # Dinaikkan ke 30 menit karena:
    # - Generate gambar AI (Stable Diffusion XL) ~30–60 detik
    # - Upload ke R2 ~5–10 detik
    # - Multi-section text generation seperti sebelumnya
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install sharp

      - name: Jalankan Agen Konten
        env:
          # ── Supabase ──────────────────────────────────────────
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:              ${{ secrets.SUPABASE_KEY }}

          # ── Cloudflare Workers AI ─────────────────────────────
          CF_ACCOUNT_ID:             ${{ secrets.CF_ACCOUNT_ID }}
          CF_AI_TOKEN:               ${{ secrets.CF_AI_TOKEN }}

          # ── Cloudflare R2 (S3-compatible HMAC credentials) ────
          # CF_R2_PUBLIC_URL       : base URL publik bucket R2 (custom domain)
          #                          contoh: https://assets.revpeak.web.id
          # CF_R2_BUCKET           : nama bucket R2 (contoh: "image")
          # CF_R2_ACCESS_KEY_ID    : R2 Access Key ID (dari dashboard R2 → Manage R2 API Tokens)
          # CF_R2_SECRET_ACCESS_KEY: R2 Secret Access Key (pasangan dari Access Key ID)
          CF_R2_PUBLIC_URL:          ${{ secrets.CF_R2_PUBLIC_URL }}
          CF_R2_BUCKET:              ${{ secrets.CF_R2_BUCKET }}
          CF_R2_ACCESS_KEY_ID:       ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY:   ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
        run: node agen-konten.js