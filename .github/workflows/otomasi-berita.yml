name: Revpeak AI News Agent

on:
  schedule:
    # UTC: 02, 06, 10, 14, 18, 22 → WIB: 09, 13, 17, 21, 01, 05
    - cron: '0 2,6,10,14,18,22 * * *'
  workflow_dispatch:

jobs:
  generate-news:
    name: Generate & Publish Berita
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v5

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: |
          echo '{"type":"module"}' > package.json
          npm install sharp

      - name: 🚀 Jalankan Agen Berita
        env:
          CF_ACCOUNT_ID:            ${{ secrets.CF_ACCOUNT_ID }}
          CF_AI_TOKEN:              ${{ secrets.CF_AI_TOKEN }}
          CF_R2_PUBLIC_URL:         ${{ secrets.CF_R2_PUBLIC_URL }}
          CF_R2_BUCKET:             ${{ secrets.CF_R2_BUCKET }}
          CF_R2_ACCESS_KEY_ID:      ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY:  ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          WORKER_URL:               ${{ secrets.WORKER_URL }}
          WORKER_SECRET:            ${{ secrets.WORKER_SECRET }}
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:     ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node agen-berita.js

      - name: 📋 Log selesai
        if: always()
        run: echo "Agen berita selesai pada $(date +'%Y-%m-%d %H:%M:%S UTC')"
