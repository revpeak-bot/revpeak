name: Revpeak AI News Agent

on:
  schedule:
    # Berjalan setiap 4 jam, digeser 2 jam dari agen-konten.yml
    # UTC: 02, 06, 10, 14, 18, 22 → WIB: 09, 13, 17, 21, 01, 05
    - cron: '0 2,6,10,14,18,22 * * *'
  workflow_dispatch:
    # Bisa dijalankan manual dari tab Actions di GitHub

jobs:
  generate-news:
    name: Generate & Publish Berita
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Jalankan Agen Berita
        env:
          CF_ACCOUNT_ID:        ${{ secrets.CF_ACCOUNT_ID }}
          CF_AI_TOKEN:          ${{ secrets.CF_AI_TOKEN }}
          WORKER_URL:           ${{ secrets.WORKER_URL }}
          WORKER_SECRET:        ${{ secrets.WORKER_SECRET }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node agen-berita.js

      - name: 📋 Log selesai
        if: always()
        run: echo "Agen berita selesai pada $(date +'%Y-%m-%d %H:%M:%S UTC')"
